services:
  mysql:
    image: mysql:8.4
    container_name: restaurant-system-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-restaurant_system}
      MYSQL_USER: ${MYSQL_USER:-restaurant_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-restaurant_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: restaurant-system-api
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: production
      API_PORT: ${API_PORT:-3000}
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE:-restaurant_system}
      MYSQL_USER: ${MYSQL_USER:-restaurant_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-restaurant_password}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change_me_access_secret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_me_refresh_secret}
    ports:
      - "${API_PORT:-3000}:3000"

volumes:
  mysql-data: